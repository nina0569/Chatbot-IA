<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tutor IA Universitario</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e1e2f,#2c2f48);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:420px;
    height:650px;
    background:#2c2f48;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.header{
    background:#4CAF50;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-radius:20px 20px 0 0;
}

.chatbox{
    flex:1;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
}

.msg{
    margin:8px;
    padding:10px;
    border-radius:10px;
    max-width:75%;
    word-wrap:break-word;
}

.user{
    background:#2196F3;
    align-self:flex-end;
}

.bot{
    background:#444;
    align-self:flex-start;
}

.input-area{
    display:flex;
    padding:10px;
    background:#1e1e2f;
}

input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
🤖 Tutor IA Universitario
</div>

<div id="chatbox" class="chatbox"></div>

<div class="input-area">

<input id="input" placeholder="Escribe tu pregunta...">

<button onclick="enviar()">Enviar</button>

<button onclick="hablar()">🎙️</button>

</div>

</div>

<script>

const URL = "https://chatbot-ia-6bIz.onrender.com/chat";

function agregarMensaje(texto,tipo){

    let chat=document.getElementById("chatbox");

    let div=document.createElement("div");

    div.className="msg "+tipo;

    div.innerText=texto;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;
}

async function enviar(){

    let input=document.getElementById("input");

    let texto=input.value;

    if(texto==="") return;

    agregarMensaje("👨‍🎓 "+texto,"user");

    input.value="";

    agregarMensaje("🤖 Pensando...","bot");

    try{

        let res=await fetch(URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({mensaje:texto})
        });

        let data=await res.json();

        document.querySelector(".chatbox").lastChild.remove();

        agregarMensaje("🤖 "+data.respuesta,"bot");

        // 🔊 VOZ DEL CHATBOT
        const voz=new SpeechSynthesisUtterance(data.respuesta);

        voz.lang="es-ES";

        speechSynthesis.speak(voz);

    }

    catch(error){

        document.querySelector(".chatbox").lastChild.remove();

        agregarMensaje("❌ Error de conexión con el servidor","bot");
    }
}

function hablar(){

    const reconocimiento=new webkitSpeechRecognition();

    reconocimiento.lang="es-ES";

    reconocimiento.start();

    reconocimiento.onresult=function(event){

        let texto=event.results[0][0].transcript;

        document.getElementById("input").value=texto;

        enviar();
    };
}

</script>

</body>
</html>
